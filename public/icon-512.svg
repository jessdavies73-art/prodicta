<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="64" fill="#0F2137"/>

  <!-- Convergence icon centred in top half, scaled 5.8x from 44x32 viewBox -->
  <g transform="translate(128, 70) scale(5.8)">
    <!-- Converging lines -->
    <line x1="7.5" y1="4" x2="18" y2="16" stroke="#00BFA5" stroke-width="1.3" stroke-linecap="round" opacity="0.35"/>
    <line x1="7.5" y1="16" x2="18" y2="16" stroke="#00BFA5" stroke-width="1.3" stroke-linecap="round" opacity="0.5"/>
    <line x1="7.5" y1="28" x2="18" y2="16" stroke="#00BFA5" stroke-width="1.3" stroke-linecap="round" opacity="0.7"/>
    <!-- Centre glow halos -->
    <circle cx="24" cy="16" r="14" fill="#00BFA5" opacity="0.06"/>
    <circle cx="24" cy="16" r="10" fill="#00BFA5" opacity="0.08"/>
    <!-- Left input dots -->
    <circle cx="5" cy="4" r="2.5" fill="#ffffff" opacity="0.5"/>
    <circle cx="5" cy="16" r="2.5" fill="#ffffff" opacity="0.65"/>
    <circle cx="5" cy="28" r="2.5" fill="#ffffff" opacity="0.8"/>
    <!-- Centre node -->
    <circle cx="24" cy="16" r="6" fill="#00BFA5"/>
    <!-- Output arrow -->
    <line x1="30" y1="16" x2="37" y2="16" stroke="#00BFA5" stroke-width="1.5" stroke-linecap="round"/>
    <polyline points="34,12.5 38,16 34,19.5" stroke="#00BFA5" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- Wordmark -->
  <text x="256" y="400" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="96" letter-spacing="4">
    <tspan fill="#ffffff">PRO</tspan><tspan fill="#00BFA5">DICTA</tspan>
  </text>
</svg>
